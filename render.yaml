services:
  - type: web
    name: choredown
    runtime: python
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn choredown.wsgi:application
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,choredown.com,www.choredown.com"
      - key: APP_NAME
        value: "ChoreDown"
      - key: DATABASE_URL
        fromDatabase:
          name: choredown-db
          property: connectionString

databases:
  - name: choredown-db
    databaseName: choredown_db
    user: choredown_user
    plan: free
