services:
  - type: web
    name: choredown
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn choredown.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,choredown.com,www.choredown.com,www.choredown.com,www.choredown.com"
      - key: DATABASE_URL
        fromDatabase:
          name: choredown-db
          property: connectionString

databases:
  - name: choredown-db
    plan: free
